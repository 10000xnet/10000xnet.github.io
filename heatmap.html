<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="/assets/css/site.css" />

    window.DISCORD_INVITE = "https://discord.gg/10000x";

<body class="has-heatmap">
  <div class="wrap">
    <div class="nav">
      <div class="brand">
        <img src="/assets/img/logo_wide.png" alt="10000x.net" onerror="this.style.display='none'">
      </div>
      <div class="links">
        <a class="pill" href="/index.html">Home</a>

        <button class="pill gold" type="button" data-open-discord="1">Join Discord</button>
      </div>
    </div>

    
<div class="card pad">
  <h1>Live Heatmap</h1>
  <div class="sub">Full-size heatmap view. Use fullscreen for the best experience.</div>
  <div class="footer"><a class="pill" href="/index.html">← Back</a></div>
</div>

<div class="card heatmap-wrap heatmap-full" id="heatmapWrap">
  <img id="heatmap" src="/hm.jpg" class="heatmap">

<script>
function refreshHeatmap(){
  const img = document.getElementById("heatmap");
  img.src = "/hm.jpg?t=" + new Date().getTime();
}

setInterval(refreshHeatmap, 60000);
</script>
  <div class="heatmap-bar">
    <div class="left">
      <div class="t">Heatmap</div>
      <div class="s">Tip: press Fullscreen, then ESC to exit.</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn" id="fullscreenBtn" type="button">FULLSCREEN</button>
      <button class="btn" type="button" data-open-discord="1">JOIN DISCORD</button>
    </div>
  </div>
</div>

  </div>


  <div class="modal-bg" id="modalBg" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Join Discord">
      <button class="x" id="closeModal" aria-label="Close">×</button>
      <h2>Join Our Discord</h2>
      <p>Factions, events, rules, and support live here. Click below to join:</p>
      <a class="btn" id="discordInviteLink" href="https://discord.gg/10000x" target="_blank" rel="noopener noreferrer">JOIN DISCORD</a>
      <div style="margin-top:12px;color:var(--muted);font-size:12px;">Invite: <code id="discordInviteCode">https://discord.gg/10000x</code></div>
    </div>
  </div>
